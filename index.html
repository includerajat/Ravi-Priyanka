<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Gift ❤️</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      font-family: sans-serif;
      cursor: pointer;
    }

    h1 {
      position: absolute;
      width: 100%;
      text-align: center;
      top: 30px;
      color: white;
      z-index: 2;
      animation: fadeIn 3s ease-in-out;
    }

    .reveal-img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 1;
      clip-path: circle(0px at 0 0);
      transition: clip-path 1.5s ease-out;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 3;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <canvas id="heartCanvas"></canvas>
  <audio id="bgMusic" src="audio/DekhaHiNahi.mp3" preload="auto"></audio>
  <script>

    /* ===========================
       Random Image Circular Reveal
    =========================== */

    alert("Click Anywhere");

    const images = [
      "images/image-1.JPG",
      "images/image-2.JPG",
      "images/image-3.JPG",
      "images/image-4.JPG",
      "images/image-5.JPG",
      "images/image-6.JPG",
      "images/image-7.JPG",
      "images/image-8.JPG",
      "images/image-9.JPG",
      "images/image-10.JPG",
      "images/image-11.JPG",
      "images/image-12.JPG",
      "images/image-13.JPG",
    ];

    const music = document.getElementById("bgMusic");

    function playMusicWithFade() {
      music.volume = 0;
      music.play();

      let volume = 0;
      const targetVolume = 0.5; // max volume (0 to 1)
      const fadeSpeed = 0.01;

      const fadeInterval = setInterval(() => {
        if (volume < targetVolume) {
          volume += fadeSpeed;
          music.volume = volume;
        } else {
          clearInterval(fadeInterval);
        }
      }, 200);
    }

    playMusicWithFade();

    document.addEventListener("click", function (e) {
      const x = e.clientX;
      const y = e.clientY;

      const img = document.createElement("img");
      img.src = images[Math.floor(Math.random() * images.length)];
      img.classList.add("reveal-img");

      img.style.clipPath = `circle(0px at ${x}px ${y}px)`;
      document.body.appendChild(img);

      // Force reflow
      img.offsetHeight;

      const maxRadius = Math.hypot(window.innerWidth, window.innerHeight);
      img.style.clipPath = `circle(${maxRadius}px at ${x}px ${y}px)`;

      // Remove old images after animation
      setTimeout(() => {
        const allImages = document.querySelectorAll('.reveal-img');
        if (allImages.length > 1) {
          allImages[0].remove();
        }
      }, 1500);
    });


    /* ===========================
       Heart Rain Animation
    =========================== */

    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    class Heart {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 12 + 4;
        this.speed = Math.random() * 1.5 + 0.5;
        this.opacity = Math.random();
      }

      draw() {
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = "#ff4d6d";
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.bezierCurveTo(this.x - this.size / 2, this.y - this.size / 2,
          this.x - this.size, this.y + this.size / 3,
          this.x, this.y + this.size);
        ctx.bezierCurveTo(this.x + this.size, this.y + this.size / 3,
          this.x + this.size / 2, this.y - this.size / 2,
          this.x, this.y);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      update() {
        this.y += this.speed;
        if (this.y > canvas.height) {
          this.y = -10;
          this.x = Math.random() * canvas.width;
        }
        this.draw();
      }
    }

    const hearts = [];
    for (let i = 0; i < 120; i++) {
      hearts.push(new Heart());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hearts.forEach(heart => heart.update());
      requestAnimationFrame(animate);
    }

    animate();

  </script>
</body>

</html>
