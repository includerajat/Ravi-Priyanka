<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="images/heart.png">
  <title>Ravi - Priyanka ❤️</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
      cursor: pointer;
    }

    h1 {
      width: 100%;
      text-align: center;
      top: 30px;
      color: #ff4d6d;
      z-index: 2;
      animation: fadeIn 3s ease-in-out;
    }

    .reveal-img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 1;
      clip-path: circle(0px at 0 0);
      transition: clip-path 1.5s ease-out;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 3;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }

    #loader h1 {
      font-size: 2rem;
      letter-spacing: 2px;
    }

    .dots::after {
      content: "";
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0% {
        content: "";
      }

      33% {
        content: ".";
      }

      66% {
        content: "..";
      }

      100% {
        content: "...";
      }
    }

    #quizContainer {
      position: fixed;
      bottom: 40px;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 5;
    }

    .quiz-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      color: white;
      text-align: center;
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
      margin: 10px;
    }

    .quiz-card h2 {
      font-size: 1.2rem;
    }

    .option-btn {
      display: block;
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .option-btn:hover {
      background: rgba(255, 105, 180, 0.5);
      color: white;
    }

    .option-selected {
      background: #ff4d6d !important;
      color: white;
    }

    #nextBtn {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    .is-hide {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="loader">
    <h1>Cooking for you<span class="dots"></span></h1>
  </div>
  <canvas id="heartCanvas"></canvas>
  <audio id="bgMusic" src="audio/DekhaHiNahi.mp3" preload="auto"></audio>
  <div id="quizContainer" class="quiz-hidden is-hide">
    <div class="quiz-card">
      <h2 id="questionText"></h2>
      <div id="optionsContainer"></div>
      <button id="nextBtn" disabled>Next</button>
    </div>
  </div>

  <script>

    /* ===========================
       Random Image Circular Reveal
    =========================== */

    let userClicks = 0;
    let isLoaded = false;

    const imagePaths = [
      "images/image-1.jpg",
      "images/image-2.jpg",
      "images/image-3.jpg",
      "images/image-4.jpg",
      "images/image-5.jpg",
      "images/image-6.jpg",
      "images/image-7.jpg",
      "images/image-8.jpg",
      "images/image-9.jpg",
      "images/image-10.jpg",
      "images/image-11.jpg",
      "images/image-12.jpg",
      "images/image-13.jpg",
    ];

    const music = document.getElementById("bgMusic");

    let musicStarted = false;

    function fadeInMusic() {
      let volume = 0;
      const target = 0.5;

      const fade = setInterval(() => {
        if (volume < target) {
          volume += 0.02;
          music.volume = volume;
        } else {
          clearInterval(fade);
        }
      }, 200);
    }

    document.addEventListener("click", function () {
      if (!musicStarted) {
        music.volume = 0;
        music.play().then(() => {
          fadeInMusic();
        }).catch(err => {
          console.log("Playback prevented:", err);
        });

        musicStarted = true;
      }

    });

    document.addEventListener("click", function (e) {
      if (!isLoaded) return;
      
      const x = e.clientX;
      const y = e.clientY;

      // const img = document.createElement("img");
      const randomImg =
        preloadedImages[Math.floor(Math.random() * preloadedImages.length)];

      const img = randomImg.cloneNode();

      // img.src = images[Math.floor(Math.random() * images.length)];
      img.classList.add("reveal-img");

      img.style.clipPath = `circle(0px at ${x}px ${y}px)`;
      document.body.appendChild(img);

      // Force reflow
      img.offsetHeight;

      const maxRadius = Math.hypot(window.innerWidth, window.innerHeight);
      img.style.clipPath = `circle(${maxRadius}px at ${x}px ${y}px)`;

      // Remove old images after animation
      setTimeout(() => {
        const allImages = document.querySelectorAll('.reveal-img');
        if (allImages.length > 1) {
          allImages[0].remove();
        }
      }, 1500);

      userClicks++;

      if ((userClicks % 5) === 0) {
        document.getElementById("quizContainer").classList.remove("is-hide");
      }
    });

    const preloadedImages = [];
    let loadedCount = 0;

    function preloadImages() {

      imagePaths.forEach(path => {
        const img = new Image();
        img.src = path;

        img.onload = () => {
          loadedCount++;
          if (loadedCount === imagePaths.length) {
            hideLoader();
            isLoaded = true;
            alert("Click anywhere for magic !!");
          }
        };

        preloadedImages.push(img);
      });
    }

    function hideLoader() {
      const loader = document.getElementById("loader");
      loader.style.opacity = "0";
      loader.style.transition = "opacity 1s ease";

      setTimeout(() => {
        loader.style.display = "none";
      }, 1000);
    }

    window.addEventListener("load", preloadImages);



    /* ===========================
       Heart Rain Animation
    =========================== */

    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    class Heart {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 12 + 4;
        this.speed = Math.random() * 1.5 + 0.5;
        this.opacity = Math.random();
      }

      draw() {
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = "#ff4d6d";
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.bezierCurveTo(this.x - this.size / 2, this.y - this.size / 2,
          this.x - this.size, this.y + this.size / 3,
          this.x, this.y + this.size);
        ctx.bezierCurveTo(this.x + this.size, this.y + this.size / 3,
          this.x + this.size / 2, this.y - this.size / 2,
          this.x, this.y);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      update() {
        this.y += this.speed;
        if (this.y > canvas.height) {
          this.y = -10;
          this.x = Math.random() * canvas.width;
        }
        this.draw();
      }
    }

    const hearts = [];
    for (let i = 0; i < 120; i++) {
      hearts.push(new Heart());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hearts.forEach(heart => heart.update());
      requestAnimationFrame(animate);
    }

    animate();

    const questions = [
      {
        question: "Aapki sabse lambi call kitne ghante chale thi?",
        options: [
          { text: "1", value: 500 },
          { text: "1-3", value: 1000 },
          { text: "3-5", value: 2000 },
          { text: "5+", value: 5000 }
        ]
      },
      {
        question: "Shaadi k din se pahle, ek dusre se kitni baar mil chuke ho?",
        options: [
          { text: "Only 1", value: 1000 },
          { text: "3 baar", value: 3000 },
          { text: "Pure 5 baar", value: 4000 },
          { text: "5+ 🌹", value: 5000 }
        ]
      },
      {
        question: "Kya app ek dusre jhagate ho?",
        options: [
          { text: "Kabhi Nhi,", value: 1000 },
          { text: "Hafte main ek do baar", value: 3000 },
          { text: "Bas ek do baar he", value: 5000 }
        ]
      }
    ];

    let currentQuestion = 0;
    let selectedValue = null;

    const questionText = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const nextBtn = document.getElementById("nextBtn");

    function loadQuestion() {
      selectedValue = null;
      nextBtn.disabled = true;
      optionsContainer.innerHTML = "";

      const q = questions[currentQuestion];
      questionText.innerText = q.question;

      q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.innerText = option.text;
        btn.classList.add("option-btn");

        btn.onclick = () => {
          document.querySelectorAll(".option-btn").forEach(b =>
            b.classList.remove("option-selected")
          );
          btn.classList.add("option-selected");

          selectedValue = option.value;
          nextBtn.disabled = false;
        };

        optionsContainer.appendChild(btn);
      });
    }

    nextBtn.onclick = () => {
      // Save answer
      localStorage.setItem(
        "question_" + currentQuestion,
        selectedValue
      );

      currentQuestion++;

      if (currentQuestion < questions.length) {
        loadQuestion();
      } else {
        localStorage.setItem("quiz_completed", "true");
        showResult();
      }
    };

    function showResult() {
      let total = 0;

      for (let i = 0; i < questions.length; i++) {
        total += parseInt(localStorage.getItem("question_" + i)) || 0;
      }

      questionText.innerText = "We are wishing you all the best and a lot of happiness for your new step of a life. Things won't be simple and who like simple, right? Enjoy your marriage life. And check your bank statement.";
      optionsContainer.innerHTML = "";
      nextBtn.style.display = "none";
    }


    function checkIfAlreadyCompleted() {
      const completed = localStorage.getItem("quiz_completed");

      if (completed === "true") {
          showResult();
      } else {
          loadQuestion();
      }
  }

  window.addEventListener("load", checkIfAlreadyCompleted);


  </script>
</body>

</html>
