<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Gift ❤️</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      font-family: sans-serif;
      cursor: pointer;
    }

    h1 {
      position: absolute;
      width: 100%;
      text-align: center;
      top: 30px;
      color: white;
      z-index: 2;
      animation: fadeIn 3s ease-in-out;
    }

    .reveal-img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 1;
      clip-path: circle(0px at 0 0);
      transition: clip-path 1.5s ease-out;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 3;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }

    #loader h1 {
      font-size: 2rem;
      letter-spacing: 2px;
    }

    .dots::after {
      content: "";
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0% {
        content: "";
      }

      33% {
        content: ".";
      }

      66% {
        content: "..";
      }

      100% {
        content: "...";
      }
    }
  </style>
</head>

<body>
  <div id="loader">
    <h1>Cooking for you<span class="dots"></span></h1>
  </div>
  <canvas id="heartCanvas"></canvas>
  <audio id="bgMusic" src="audio/DekhaHiNahi.mp3" preload="auto"></audio>
  <script>

    /* ===========================
       Random Image Circular Reveal
    =========================== */

    alert("Click Anywhere");

    const imagePaths = [
      "images/image-1.jpg",
      "images/image-2.jpg",
      "images/image-3.jpg",
      "images/image-4.jpg",
      "images/image-5.jpg",
      "images/image-6.jpg",
      "images/image-7.jpg",
      "images/image-8.jpg",
      "images/image-9.jpg",
      "images/image-10.jpg",
      "images/image-11.jpg",
      "images/image-12.jpg",
      "images/image-13.jpg",
    ];

    const music = document.getElementById("bgMusic");

    let musicStarted = false;

    function fadeInMusic() {
      let volume = 0;
      const target = 0.5;

      const fade = setInterval(() => {
        if (volume < target) {
          volume += 0.02;
          music.volume = volume;
        } else {
          clearInterval(fade);
        }
      }, 200);
    }

    document.addEventListener("click", function () {
      if (!musicStarted) {
        music.volume = 0;
        music.play().then(() => {
          fadeInMusic();
        }).catch(err => {
          console.log("Playback prevented:", err);
        });

        musicStarted = true;
      }

    });

    document.addEventListener("click", function (e) {
      const x = e.clientX;
      const y = e.clientY;

      // const img = document.createElement("img");
      const randomImg =
        preloadedImages[Math.floor(Math.random() * preloadedImages.length)];

      const img = randomImg.cloneNode();

      // img.src = images[Math.floor(Math.random() * images.length)];
      img.classList.add("reveal-img");

      img.style.clipPath = `circle(0px at ${x}px ${y}px)`;
      document.body.appendChild(img);

      // Force reflow
      img.offsetHeight;

      const maxRadius = Math.hypot(window.innerWidth, window.innerHeight);
      img.style.clipPath = `circle(${maxRadius}px at ${x}px ${y}px)`;

      // Remove old images after animation
      setTimeout(() => {
        const allImages = document.querySelectorAll('.reveal-img');
        if (allImages.length > 1) {
          allImages[0].remove();
        }
      }, 1500);
    });

    const preloadedImages = [];
    let loadedCount = 0;

    function preloadImages() {

      imagePaths.forEach(path => {
        const img = new Image();
        img.src = path;

        img.onload = () => {
          loadedCount++;
          if (loadedCount === imagePaths.length) {
            hideLoader();
          }
        };

        preloadedImages.push(img);
      });
    }

    function hideLoader() {
      const loader = document.getElementById("loader");
      loader.style.opacity = "0";
      loader.style.transition = "opacity 1s ease";

      setTimeout(() => {
        loader.style.display = "none";
      }, 1000);
    }

    window.addEventListener("load", preloadImages);



    /* ===========================
       Heart Rain Animation
    =========================== */

    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    class Heart {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 12 + 4;
        this.speed = Math.random() * 1.5 + 0.5;
        this.opacity = Math.random();
      }

      draw() {
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = "#ff4d6d";
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.bezierCurveTo(this.x - this.size / 2, this.y - this.size / 2,
          this.x - this.size, this.y + this.size / 3,
          this.x, this.y + this.size);
        ctx.bezierCurveTo(this.x + this.size, this.y + this.size / 3,
          this.x + this.size / 2, this.y - this.size / 2,
          this.x, this.y);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      update() {
        this.y += this.speed;
        if (this.y > canvas.height) {
          this.y = -10;
          this.x = Math.random() * canvas.width;
        }
        this.draw();
      }
    }

    const hearts = [];
    for (let i = 0; i < 120; i++) {
      hearts.push(new Heart());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hearts.forEach(heart => heart.update());
      requestAnimationFrame(animate);
    }

    animate();

  </script>
</body>

</html>
